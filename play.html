<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FFCB05" />

    <title>포랜디 플레이 — 포켓몬 랜덤 디펜스</title>
    <meta name="description" content="포랜디 실제 플레이 화면. 포켓몬을 뽑고, 합치고, 진화시켜 웨이브를 막아내세요." />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://porande.vercel.app/play" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #07080f;
        color: #e6e6f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        touch-action: none; /* 스크롤/줌 방지, 드래그는 Phaser가 처리 */
        overscroll-behavior: contain;
      }
      @supports (height: 100dvh) {
        html, body { height: 100dvh; }
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-container {
        box-shadow: 0 12px 60px rgba(0, 0, 0, 0.7);
        border-radius: 12px;
        overflow: hidden;
      }
      #game-container canvas {
        display: block;
      }

      /* 세로 모드: 가로 회전 안내 */
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #132a52, #050f24);
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #FFCB05;
        text-align: center;
        padding: 40px 24px;
      }
      #rotate-hint .icon {
        font-size: 64px;
        margin-bottom: 16px;
        animation: rotate-hint 2s ease-in-out infinite;
      }
      #rotate-hint h2 {
        font-size: 22px;
        margin-bottom: 10px;
        color: #FFCB05;
      }
      #rotate-hint p {
        font-size: 14px;
        color: #9FB4DA;
        line-height: 1.6;
      }
      @keyframes rotate-hint {
        0%, 100% { transform: rotate(-90deg); }
        50%      { transform: rotate(0deg); }
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate-hint { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="rotate-hint" role="alert">
      <div class="icon">📱</div>
      <h2>가로 모드로 플레이해주세요</h2>
      <p>기기를 옆으로 돌리면<br />게임이 화면에 꽉 채워집니다</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
