<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FFCB05" />

    <title>포랜디 플레이 — 포켓몬 랜덤 디펜스</title>
    <meta name="description" content="포랜디 실제 플레이 화면. 포켓몬을 뽑고, 합치고, 진화시켜 웨이브를 막아내세요." />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://porande.vercel.app/play" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #07080f;
        color: #e6e6f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        touch-action: none; /* 스크롤/줌 방지, 드래그는 Phaser가 처리 */
        overscroll-behavior: contain;
      }
      @supports (height: 100dvh) {
        html, body { height: 100dvh; }
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-container {
        box-shadow: 0 12px 60px rgba(0, 0, 0, 0.7);
        border-radius: 12px;
        overflow: hidden;
      }
      #game-container canvas {
        display: block;
      }
      /* 모바일에선 장식 제거 + 여백 최소화 */
      @media (max-width: 900px) {
        #game-container {
          box-shadow: none;
          border-radius: 0;
          width: 100vw;
          height: 100vh;
          height: 100dvh;
        }
      }

      /* 로그인 UI (우측 상단) */
      #auth-ui {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #auth-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(10, 26, 56, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        color: #ffffff;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        transition: background 0.15s, transform 0.15s;
      }
      #auth-btn:hover { background: rgba(42, 117, 187, 0.7); transform: translateY(-1px); }
      #auth-btn:active { transform: translateY(0); }
      #auth-btn img { width: 18px; height: 18px; border-radius: 50%; }
      #auth-btn .g-icon {
        width: 16px; height: 16px; display: inline-block;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><path fill='%23FFC107' d='M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z'/><path fill='%23FF3D00' d='M6.3 14.7l6.6 4.8C14.7 15.9 19 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16 4 9.2 8.8 6.3 14.7z'/><path fill='%234CAF50' d='M24 44c5.5 0 10.4-2.1 14.1-5.5l-6.5-5.5c-2 1.5-4.6 2.5-7.6 2.5-5.2 0-9.6-3.3-11.2-8L6.3 33.4C9.2 39.3 15.9 44 24 44z'/><path fill='%231976D2' d='M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4 5.5l6.5 5.5C41.6 34.8 44 29.8 44 24c0-1.3-.1-2.6-.4-3.9z'/></svg>");
        background-repeat: no-repeat;
        background-size: contain;
      }
      #auth-menu {
        display: none;
        position: absolute;
        top: 48px;
        right: 0;
        background: #1a1c2f;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 6px;
        min-width: 160px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      #auth-menu.open { display: block; }
      #auth-menu button {
        width: 100%;
        background: transparent;
        border: none;
        color: #ffffff;
        padding: 10px 12px;
        text-align: left;
        font-size: 13px;
        border-radius: 8px;
        cursor: pointer;
      }
      #auth-menu button:hover { background: rgba(255,255,255,0.08); }

      /* 세로 모드: 가로 회전 안내 */
      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #132a52, #050f24);
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #FFCB05;
        text-align: center;
        padding: 40px 24px;
      }
      #rotate-hint .icon {
        font-size: 64px;
        margin-bottom: 16px;
        animation: rotate-hint 2s ease-in-out infinite;
      }
      #rotate-hint h2 {
        font-size: 22px;
        margin-bottom: 10px;
        color: #FFCB05;
      }
      #rotate-hint p {
        font-size: 14px;
        color: #9FB4DA;
        line-height: 1.6;
      }
      @keyframes rotate-hint {
        0%, 100% { transform: rotate(-90deg); }
        50%      { transform: rotate(0deg); }
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate-hint { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="auth-ui">
      <button id="auth-btn" type="button" aria-label="로그인">
        <span class="auth-label">
          <span class="g-icon"></span>
          <span class="label-text">로그인</span>
        </span>
      </button>
      <div id="auth-menu" role="menu">
        <button type="button" id="logout-btn">로그아웃</button>
      </div>
    </div>
    <div id="rotate-hint" role="alert">
      <div class="icon">📱</div>
      <h2>가로 모드로 플레이해주세요</h2>
      <p>기기를 옆으로 돌리면<br />게임이 화면에 꽉 채워집니다</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script type="module">
      import { signInWithGoogle, signOut, onAuthChange } from '/src/lib/firebase.ts';
      const btn = document.getElementById('auth-btn');
      const menu = document.getElementById('auth-menu');
      const logoutBtn = document.getElementById('logout-btn');
      const labelText = btn.querySelector('.label-text');
      const gIcon = btn.querySelector('.g-icon');
      let currentUser = null;

      onAuthChange((user) => {
        currentUser = user;
        if (user) {
          labelText.textContent = user.displayName || '사용자';
          gIcon.style.display = 'none';
          // 프로필 이미지
          let img = btn.querySelector('img');
          if (!img) {
            img = document.createElement('img');
            btn.querySelector('.auth-label').insertBefore(img, labelText);
          }
          if (user.photoURL) img.src = user.photoURL;
        } else {
          labelText.textContent = '로그인';
          gIcon.style.display = 'inline-block';
          const img = btn.querySelector('img');
          if (img) img.remove();
        }
      });

      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (currentUser) {
          menu.classList.toggle('open');
        } else {
          await signInWithGoogle();
        }
      });
      logoutBtn.addEventListener('click', async () => {
        menu.classList.remove('open');
        await signOut();
      });
      document.addEventListener('click', (e) => {
        if (!menu.contains(e.target) && !btn.contains(e.target)) {
          menu.classList.remove('open');
        }
      });
    </script>
  </body>
</html>
